services:
  letta:
    image: letta/letta:latest
    ports:
      - "8283:8283"
    volumes:
      - letta-db:/root/.letta
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8283/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  alpaca-mcp:
    build:
      context: .
      dockerfile: docker/alpaca-mcp/Dockerfile
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_BASE_URL=${ALPACA_BASE_URL}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ 2>/dev/null | head -c1 | grep -q . || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  scheduler:
    build: .
    volumes:
      - ./scripts:/app/scripts
      - ./logs:/app/logs
      - agent-state:/app/state
    env_file:
      - .env
    depends_on:
      letta:
        condition: service_healthy
      alpaca-mcp:
        condition: service_healthy
    restart: unless-stopped

volumes:
  letta-db:
  agent-state:
