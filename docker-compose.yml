services:
  letta:
    image: letta/letta:latest
    ports:
      - "8283:8283"
    volumes:
      - letta-db:/root/.letta
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8283/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  alpaca-mcp:
    image: ghcr.io/alpacahq/alpaca-mcp-server:latest
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_BASE_URL=${ALPACA_BASE_URL}
    ports:
      - "8000:8000"
    restart: unless-stopped

  scheduler:
    build: .
    volumes:
      - ./scripts:/app/scripts
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      letta:
        condition: service_healthy
      alpaca-mcp:
        condition: service_started
    restart: unless-stopped

volumes:
  letta-db:
